<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>JARVIS OS</title>
<meta name="robots" content="noindex,nofollow">
<link rel="manifest" href="/jarvis-manifest.json">
<meta name="theme-color" content="#04070b">
<link rel="apple-touch-icon" href="/jarvis-icon-180.png">
<link rel="icon" href="/jarvis-icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JARVIS">
<style>
  :root{
    --bg:#04070b; --panel:#0a0f16; --panel2:#0c1119; --line:rgba(57,255,122,.16);
    --line2:rgba(57,255,122,.32); --green:#39ff7a; --green2:#27d36a; --gdim:#1f9e54;
    --dim:#566372; --dim2:#8497a6; --white:#eaf6ef; --amber:#ffb340; --gray:#3a4654; --red:#ff5a5a;
  }
  *{box-sizing:border-box}
  body{margin:0;background:
      radial-gradient(1100px 600px at 50% 38%, rgba(57,255,122,.05), transparent 60%), var(--bg);
    color:var(--white);font-family:"SF Mono",ui-monospace,Menlo,Consolas,monospace;font-size:13px;
    padding-bottom:env(safe-area-inset-bottom);}
  .hud{max-width:1672px;margin:0 auto;padding:14px;display:flex;flex-direction:column;gap:12px}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 14px;position:relative}
  .lbl{font-size:9.5px;letter-spacing:.2em;color:var(--green2);text-transform:uppercase;margin:0 0 9px;display:flex;align-items:center;gap:7px}
  .lbl .ln{flex:1;height:1px;background:linear-gradient(90deg,var(--line2),transparent)}
  .dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex:none}
  .ok{background:var(--green);box-shadow:0 0 8px var(--green)} .warn{background:var(--amber);box-shadow:0 0 8px rgba(255,179,64,.6)} .off{background:var(--gray)}
  /* status word — Operational / Offline (infra), Connected / Offline (social) */
  .st{font-size:9px;letter-spacing:.14em;text-transform:uppercase;font-weight:600;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
  .st .sd{width:6px;height:6px;border-radius:50%;flex:none}
  .st.on{color:var(--green2)} .st.on .sd{background:var(--green);box-shadow:0 0 5px rgba(57,255,122,.7)}
  .st.down{color:#ff6a6a} .st.down .sd{background:var(--red);box-shadow:0 0 5px rgba(255,90,90,.6)}
  .row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:12px;color:var(--dim2);gap:8px}
  .row b{color:var(--white);font-weight:600}
  .ph{color:var(--dim);font-size:10.5px;padding:5px 0;line-height:1.5}

  /* icon tiles */
  .ico{width:30px;height:30px;border-radius:8px;flex:none;display:grid;place-items:center;font-weight:800;font-size:13px;color:#fff;overflow:hidden}
  .ico svg{width:18px;height:18px;display:block}

  /* ===== top ===== */
  .top{display:grid;grid-template-columns:300px 1fr;gap:12px;align-items:stretch}
  .brandtop{display:flex;flex-direction:column;justify-content:center;gap:4px}
  .brandtop h1{margin:0;font-size:34px;font-weight:800;letter-spacing:.06em;color:var(--white);line-height:1}
  .brandtop .j{font-size:15px;letter-spacing:.3em;color:var(--green);text-transform:uppercase}
  .brandtop .s{font-size:9.5px;letter-spacing:.24em;color:var(--dim);text-transform:uppercase}
  .ctrls{display:flex;gap:8px;margin-top:8px}
  .btn{background:rgba(57,255,122,.07);border:1px solid var(--line2);color:var(--green);border-radius:7px;padding:6px 10px;font:inherit;font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;gap:5px}
  .btn:active{filter:brightness(1.3)} .btn.spin svg{animation:spin 1s linear infinite} .btn svg{width:11px;height:11px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .intel{display:grid;grid-template-columns:1.1fr 2.1fr 1.1fr 1.5fr;gap:14px}
  .stat .k{font-size:9px;letter-spacing:.12em;color:var(--dim2);text-transform:uppercase}
  .stat .n{font-size:22px;font-weight:800;color:var(--white);line-height:1.1}
  .stat .d{font-size:10px;color:var(--green2)}
  .chart{height:42px;margin-top:6px} .chart svg{width:100%;height:100%;display:block}
  .perf{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  ul.bul{margin:6px 0 0;padding-left:13px;color:var(--dim2);font-size:10.5px;line-height:1.7}
  ul.bul li::marker{color:var(--green2)}

  /* ===== main ===== */
  .main{display:grid;grid-template-columns:240px minmax(0,1fr);gap:12px;align-items:start}
  .rightcol{display:flex;flex-direction:column;gap:12px;min-width:0}
  .maincols{display:grid;grid-template-columns:minmax(0,1fr) 204px 150px;gap:12px;align-items:start}
  .rail{display:flex;flex-direction:column;gap:12px}
  .cmd .ico{width:26px;height:26px}
  .gaugewrap{display:flex;align-items:center;gap:14px;margin:2px 0 6px}
  .gauge{width:84px;height:84px;border-radius:50%;display:grid;place-items:center;flex:none;
    background:conic-gradient(var(--green) 0 97%, rgba(255,255,255,.05) 97% 100%);box-shadow:0 0 20px rgba(57,255,122,.25)}
  .gauge i{width:64px;height:64px;border-radius:50%;background:var(--panel);display:grid;place-items:center;font-style:normal;text-align:center}
  .gauge b{font-size:17px;font-weight:800;color:var(--green);display:block;line-height:1} .gauge span{font-size:7px;letter-spacing:.15em;color:var(--dim)}
  .gmeters{flex:1} .gmeters .row{padding:2px 0;font-size:11px}

  /* center reactor + clusters */
  .center{display:flex;flex-direction:column;min-height:476px;position:relative;overflow:visible}
  .core-row{display:grid;grid-template-columns:1fr 268px 1fr;gap:16px;align-items:center;flex:1}
  .health-row{display:flex;gap:16px;border-top:1px solid var(--line2);margin-top:8px;padding-top:10px;z-index:2}
  .health-corner{flex:1;min-width:0}
  .status-corner{flex:1;min-width:0}
  .health-corner .gauge{width:70px;height:70px} .health-corner .gauge b{font-size:15px} .health-corner .gaugewrap{margin:0}
  .center .bgspokes{position:absolute;inset:0;z-index:0;pointer-events:none;opacity:.5}
  .cluster{display:flex;flex-direction:column;gap:9px;position:relative;z-index:2}
  .node{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:8px 10px;display:flex;align-items:center;gap:9px;position:relative}
  .node .nx{min-width:0;flex:1} .node .nn{font-size:12.5px;color:var(--white);font-weight:700;line-height:1.1}
  .node .nr{font-size:9px;color:var(--dim);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .node.tap{cursor:pointer}
  /* live energy lines drawn from the reactor to each connector box */
  #conlines{position:absolute;inset:0;z-index:1;pointer-events:none}
  #conlines .cbase{fill:none;stroke:rgba(57,255,122,.28);stroke-width:1.2;filter:url(#cg)}
  #conlines .cflow{fill:none;stroke:#bdffd6;stroke-width:1.5;stroke-dasharray:2 12;filter:url(#cg);animation:flow .9s linear infinite}
  #conlines .cflow.down{stroke:#ff7a7a;animation:none;opacity:.35}
  #conlines .cend{filter:url(#cg)}
  @keyframes flow{to{stroke-dashoffset:-15}}
  .reactor{justify-self:center;width:268px;height:268px;position:relative;z-index:1;display:grid;place-items:center}
  .reactor svg{position:absolute;inset:0;width:100%;height:100%}
  .reactor .ringspin{animation:spin 26s linear infinite;transform-origin:50% 50%}
  .reactor .ringspin.rev{animation:spin 38s linear infinite reverse}
  .reactor .pulse{animation:rpulse 1.7s ease-in-out infinite;transform-origin:50% 50%}
  .reactor .pulse.p2{animation-duration:2.3s;animation-delay:-.6s}
  @keyframes rpulse{0%,100%{opacity:.55} 50%{opacity:1}}
  .reactor .flick{animation:flick 3.4s steps(1) infinite}
  @keyframes flick{0%,7%,9%,55%,57%,100%{opacity:1}8%,56%{opacity:.45}}
  .rcore{width:118px;height:118px;border-radius:50%;display:grid;place-items:center;text-align:center;z-index:2;
    background:radial-gradient(circle at 50% 45%, #0a1f13 0%, #061009 70%, #03070a 100%);
    border:1px solid rgba(57,255,122,.55);box-shadow:0 0 26px rgba(57,255,122,.35), inset 0 0 22px rgba(57,255,122,.18)}
  /* Mini reactor buttons (NUKE IT / RECOVERY CODES) — same cues, scaled + tinted */
  .rxrow{display:flex;justify-content:center;gap:14px;margin-top:8px}
  .rxcap{margin-top:12px;text-align:center;color:#fff;font-size:9px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;line-height:1.5}
  .rxbtn{position:relative;width:98px;height:98px;padding:0;border:none;background:none;cursor:pointer;display:grid;place-items:center;border-radius:50%}
  .rxbtn svg{position:absolute;inset:0;width:100%;height:100%}
  .rxbtn .ringspin{animation:spin 26s linear infinite;transform-origin:50% 50%}
  .rxbtn .ringspin.rev{animation:spin 38s linear infinite reverse}
  .rxbtn .pulse{animation:rpulse 1.7s ease-in-out infinite;transform-origin:50% 50%}
  .rxbtn .pulse.p2{animation-duration:2.3s;animation-delay:-.6s}
  .rxbtn .flick{animation:flick 3.4s steps(1) infinite}
  .rxbtn .rxcore{position:relative;z-index:2;width:62px;height:62px;border-radius:50%;display:grid;place-items:center;text-align:center;transition:transform .12s,box-shadow .2s}
  .rxbtn .rxcore b{font-size:10px;font-weight:800;letter-spacing:.08em;color:#fff;line-height:1.18;text-transform:uppercase}
  .rxbtn:active .rxcore{transform:scale(.93)}
  .rxbtn.red .rxcore{background:radial-gradient(circle at 50% 45%, #2a0808 0%, #160404 70%, #0a0203 100%);border:1px solid rgba(255,90,90,.6);box-shadow:0 0 24px rgba(255,90,90,.4), inset 0 0 18px rgba(255,90,90,.22)}
  .rxbtn.red:hover .rxcore{box-shadow:0 0 32px rgba(255,90,90,.65), inset 0 0 20px rgba(255,90,90,.3)}
  .rxbtn.blue .rxcore{background:radial-gradient(circle at 50% 45%, #07172a 0%, #040d16 70%, #02060a 100%);border:1px solid rgba(90,170,255,.6);box-shadow:0 0 24px rgba(90,170,255,.4), inset 0 0 18px rgba(90,170,255,.22)}
  .rxbtn.blue:hover .rxcore{box-shadow:0 0 32px rgba(90,170,255,.65), inset 0 0 20px rgba(90,170,255,.3)}
  /* Glossy red dome push-button in a chrome bezel (the kill switch) */
  .pushbtn{position:relative;width:104px;height:104px;padding:0;border:none;background:none;cursor:pointer;border-radius:50%}
  .pushbtn .bezel{position:absolute;inset:0;border-radius:50%;
    background:radial-gradient(circle at 50% 32%, #eef2f6 0%, #c2cbd3 26%, #8c959d 52%, #5a626a 74%, #353a40 100%);
    box-shadow:0 5px 11px rgba(0,0,0,.55), inset 0 2px 3px rgba(255,255,255,.7), inset 0 -4px 8px rgba(0,0,0,.55)}
  .pushbtn .bolt{position:absolute;left:50%;top:50%;width:7px;height:7px;margin:-3.5px;border-radius:50%;
    background:radial-gradient(circle at 40% 35%, #f4f7fa 0%, #9aa3ab 55%, #4c535a 100%);box-shadow:inset 0 -1px 1px rgba(0,0,0,.5)}
  .pushbtn .dome{position:absolute;inset:15px;border-radius:50%;display:grid;place-items:center;text-align:center;
    background:radial-gradient(circle at 50% 30%, #ff8f8f 0%, #ff3d3d 30%, #e00000 64%, #9c0000 100%);
    box-shadow:inset 0 3px 9px rgba(255,255,255,.6), inset 0 -7px 13px rgba(0,0,0,.5), 0 0 16px rgba(255,40,40,.5);
    transition:transform .08s, box-shadow .12s}
  .pushbtn:hover .dome{box-shadow:inset 0 3px 9px rgba(255,255,255,.65), inset 0 -7px 13px rgba(0,0,0,.5), 0 0 26px rgba(255,55,55,.75)}
  .pushbtn:active .dome{transform:scale(.94);box-shadow:inset 0 6px 14px rgba(0,0,0,.45), 0 0 10px rgba(255,40,40,.5)}
  .pushbtn .dome b{color:#fff;font-weight:800;font-size:11px;line-height:1.12;letter-spacing:.03em;text-transform:uppercase;text-shadow:0 1px 2px rgba(0,0,0,.55)}
  .pushbtn .gloss{position:absolute;top:7%;left:18%;width:64%;height:38%;border-radius:50%;pointer-events:none;
    background:linear-gradient(to bottom, rgba(255,255,255,.6), rgba(255,255,255,0))}
  .rcore b{display:block;font-size:14px;letter-spacing:.16em;color:var(--white)}
  .rcore .c{font-size:8.5px;letter-spacing:.2em;color:var(--green2);margin-top:2px}
  .rcore .a{font-size:7px;letter-spacing:.24em;color:var(--gdim);margin-top:3px;display:inline-flex;align-items:center;gap:4px}

  .ghrecent{margin:5px 0 2px;display:flex;flex-direction:column}
  .ghrow{display:flex;flex-direction:column;gap:1px;padding:4px 2px;border-top:1px solid rgba(57,255,122,.08)}
  .ghmsg{font-size:10px;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ghmeta{font-size:8px;color:var(--dim);letter-spacing:.04em;text-transform:uppercase}
  .social .scard{display:flex;align-items:center;gap:9px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:7px 9px;margin-bottom:8px}
  .social .scard .nx{flex:1;min-width:0} .social .nn{font-size:12px;color:var(--white);font-weight:700}
  .social .nr{font-size:8.5px;color:var(--dim);margin-top:1px}

  .crail .cstep{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04)}
  .crail .cnum{font-size:22px;font-weight:800;color:var(--green);width:34px;text-align:right}
  .crail .ck{font-size:11px;color:var(--white);font-weight:600} .crail .cs{font-size:8.5px;color:var(--dim)}
  .crail .tc{display:flex;justify-content:space-between;padding:5px 0;font-size:11px;color:var(--dim2);gap:8px} .crail .tc b{color:var(--green2)}

  /* ===== bottom ===== */
  .bottom{display:grid;grid-template-columns:1fr 1fr 1fr 220px;gap:12px}
  .tq{display:flex;justify-content:space-between;padding:5px 0;font-size:11.5px;border-bottom:1px solid rgba(255,255,255,.04);gap:8px}
  .tq button{all:unset;cursor:pointer;display:flex;justify-content:space-between;width:100%}
  .pri-h{color:var(--amber)} .pri-m{color:#d7b46a} .pri-l{color:var(--dim)}
  .triage{display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:center}
  .triage .num{font-size:42px;font-weight:800;color:var(--green);line-height:.9;text-shadow:0 0 18px rgba(57,255,122,.4)}
  .footbrand{display:flex;flex-direction:column;justify-content:center;gap:3px;text-align:right}
  .footbrand h2{margin:0;font-size:18px;font-weight:800;letter-spacing:.06em} .footbrand .j{font-size:9px;letter-spacing:.2em;color:var(--green)} .footbrand .s{font-size:8.5px;color:var(--dim)}
  .addbtn{background:rgba(57,255,122,.1);border:1px solid var(--line2);color:var(--green);border-radius:6px;padding:2px 8px;font:inherit;font-size:8.5px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;margin-left:auto}
  .legend{display:flex;gap:18px;font-size:9.5px;color:var(--dim);padding:0 2px;flex-wrap:wrap} .legend span{display:flex;align-items:center;gap:6px}

  /* gate + sheet */
  .gate{min-height:72vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:14px}
  .gate h1{margin:0;font-size:30px;font-weight:800;letter-spacing:.05em} .gate .j{font-size:11px;letter-spacing:.24em;color:var(--green);text-transform:uppercase}
  .gate p{color:var(--dim2);font-size:13px;max-width:300px;line-height:1.5} .gate .err{color:var(--amber)}
  .gbtn{display:flex;align-items:center;gap:10px;background:#fff;color:#202124;border:none;border-radius:10px;padding:12px 18px;font-family:inherit;font-weight:600;font-size:14px;cursor:pointer}.gbtn svg{width:18px;height:18px}
  .sheet{position:fixed;inset:0;z-index:80;background:rgba(2,5,8,.74);-webkit-backdrop-filter:blur(5px);backdrop-filter:blur(5px);display:flex;align-items:flex-end;justify-content:center;opacity:0;transition:opacity .2s}
  .sheet.open{opacity:1}
  .sheetcard{width:100%;max-width:480px;background:var(--panel);border:1px solid var(--line2);border-bottom:none;border-radius:16px 16px 0 0;padding:18px 16px calc(20px + env(safe-area-inset-bottom));transform:translateY(18px);transition:transform .2s}
  .sheet.open .sheetcard{transform:none}
  .sheetcard h3{margin:0 0 6px;font-size:16px;color:var(--white)} .sheetcard .gn{font-size:11px;color:var(--dim);margin-bottom:8px}
  .sheetcard label{display:block;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin:10px 0 4px}
  .sheetcard input{width:100%;padding:11px;font:inherit;font-size:14px;color:var(--white);background:var(--panel2);border:1px solid var(--line);border-radius:8px;outline:none}
  .sheetcard input:focus{border-color:var(--line2)}
  .sfrow{display:flex;gap:10px}.sfrow>div{flex:1}
  .sfmsg{font-size:12px;color:var(--amber);min-height:15px;margin-top:7px}
  /* On-demand voice lens overlay */
  #jvLens{position:fixed;inset:0;z-index:95;display:none;align-items:center;justify-content:center;padding:18px;
    background:rgba(2,5,8,.72);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px)}
  #jvLens.vis{display:flex}
  #jvLens .lenscard{width:min(560px,94vw);max-height:80vh;overflow:auto;background:var(--panel);border:1px solid var(--line2);
    border-radius:16px;padding:18px;box-shadow:0 0 44px rgba(57,255,122,.18)}
  #jvLens .lenshd{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  #jvLens .lenshd b{font-size:14px;letter-spacing:.1em;color:var(--white);text-transform:uppercase}
  #jvLens .lensclose{margin-left:auto;background:none;border:1px solid rgba(57,255,122,.3);border-radius:7px;color:var(--dim2);
    font:inherit;font-size:11px;padding:5px 11px;cursor:pointer}
  #jvLens .lensclose:hover{border-color:var(--green2);color:var(--white)}
  #jvLens .lenssum{font-size:11px;color:var(--green2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
  #jvLens .lensrow{display:flex;flex-direction:column;gap:2px;padding:9px 2px;border-top:1px solid rgba(57,255,122,.1)}
  #jvLens .lensrow .m{font-size:13px;color:var(--white);line-height:1.35}
  #jvLens .lensrow .s{font-size:9px;color:var(--dim);letter-spacing:.07em;text-transform:uppercase}
  /* calendar lens */
  #jvLens .calhd{text-align:center;font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:var(--green2);margin:2px 0 8px}
  #jvLens .calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  #jvLens .cawd{font-size:8px;letter-spacing:.06em;text-transform:uppercase;color:var(--dim);text-align:center;padding:2px 0}
  #jvLens .caday{position:relative;min-height:42px;border:1px solid rgba(57,255,122,.08);border-radius:7px;padding:3px 4px;font-size:11px;color:var(--dim2)}
  #jvLens .caday.out{opacity:.25}
  #jvLens .caday.today{border-color:var(--green2);box-shadow:0 0 10px rgba(57,255,122,.35);color:var(--white)}
  #jvLens .caday .cn{font-weight:700}
  #jvLens .caev{margin-top:2px;font-size:8px;line-height:1.25;color:var(--green2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #jvLens .caev.pri{color:var(--amber)}
  #jvLens .caev.more{color:var(--dim)}
  #jvLens .catoday{margin-top:12px}
  #jvLens .caempty{font-size:12px;color:var(--dim);padding:8px 2px}
  .confirm{width:100%;margin-top:13px;background:var(--green);color:#05140b;border:none;border-radius:9px;padding:13px;font:inherit;font-weight:700;font-size:14px;cursor:pointer}.confirm:disabled{opacity:.6}
  .cancel{width:100%;margin-top:8px;background:none;border:none;color:var(--dim2);font:inherit;font-size:12px;cursor:pointer}

  /* responsive */
  @media (max-width:1240px){ .main{grid-template-columns:1fr} .maincols{grid-template-columns:1fr 1fr} .top{grid-template-columns:1fr} .intel{grid-template-columns:1fr 1fr} .bottom{grid-template-columns:1fr 1fr} }
  @media (max-width:720px){
    .hud{padding:10px;gap:10px} .main{grid-template-columns:1fr} .maincols{grid-template-columns:1fr} .intel{grid-template-columns:1fr} .perf{grid-template-columns:repeat(2,1fr)} .bottom{grid-template-columns:1fr}
    .center{min-height:0} .core-row{grid-template-columns:1fr} .core-row .reactor-col{order:-1;margin:0 auto 8px} .reactor-col{width:auto} #jvCaption{position:static;transform:none;margin-top:6px;max-width:90vw} .health-corner{width:100%}
    .cluster.left .node::after,.cluster.left .node::before,.cluster.right .node::after,.cluster.right .node::before{display:none}
    .brandtop h1{font-size:28px}
  }

  /* ===== voice overlay ===== */
  .reactor{cursor:pointer;transition:filter .25s}
  .reactor:hover{filter:brightness(1.18)}
  body.jv-listening .reactor svg circle{stroke:#39ff7a !important}
  body.jv-listening .reactor{filter:drop-shadow(0 0 22px rgba(57,255,122,.9))}

  // brand icon tiles (simplified, brand-coloured)

  };
  function ico(key){ var v=IC[key]||('#0b1018|'); var i=v.indexOf('|'); var bg=v.slice(0,i), svg=v.slice(i+1);

  function chart(vals,area){ if(!vals||vals.length<2){ vals=[3,5,4,7,6,9,8,11,10,13]; }

      +'</div>';
    H+='</div>'; // rightcol
    H+='</div>'; // main

  // ===== Full-duplex conversation engine =====
  // One persistent, echo-cancelled mic for the whole conversation. A continuous
  // voice-activity loop listens the ENTIRE time — including while Jarvis speaks —
  // so the moment Mike starts talking, Jarvis hushes (barge-in) and captures the
  // new instruction. Echo cancellation keeps Jarvis's own voice from triggering it.
  var jvStream=null, jvAudioCtx=null, jvVADraf=0, jvCapturing=false, jvCapStart=0, jvOnset=0, jvLastLoud=0;

    return jvStream;

  function jvReleaseStream(){

    try{ src=jvAudioCtx.createMediaStreamSource(jvStream); an=jvAudioCtx.createAnalyser(); an.fftSize=512; src.connect(an); }
    catch(e){ return; }
    var buf=new Uint8Array(an.fftSize);
    var loop=function(){
      if(!jvConvo){ jvVADraf=0; return; }
      an.getByteTimeDomainData(buf);
      var sum=0; for(var i=0;i<buf.length;i++){ var v=(buf[i]-128)/128; sum+=v*v; }

          }
        } else { jvOnset=0; }
      } else {
        if(now-jvLastLoud>1200 || now-jvCapStart>15000){ jvEndSegment(); }   // pause → send
      }

    };

    $('#mfaSignOut').onclick=function(){ sb.auth.signOut().then(function(){ location.reload(); }); };
  }

  // After a factor verifies, mint recovery codes and show them ONCE before entry.
  // (Codes don't exist yet, so the server still authorizes this at AAL1.)
  async function showBackupCodes(){
    app.innerHTML='<div class="hud"><div class="gate"><h1>JARVIS OS</h1><span class="j" style="font-size:11px;letter-spacing:.2em">GENERATING RECOVERY CODES…</span></div></div>';
    var codes=[];
    try{
      try{ var rs=await sb.auth.refreshSession(); if(rs&&rs.data&&rs.data.session&&rs.data.session.access_token){ token=rs.data.session.access_token; } }catch(e){}
      var r=await fetch('/jarvis/mfa/backup-codes',{method:'POST',headers:{'Authorization':'Bearer '+token}});
      var d=await r.json(); codes=(d&&d.codes)||[];
    }catch(e){}
    var cont=function(){ sb.auth.mfa.getAuthenticatorAssuranceLevel().then(function(lvl){
        if(((lvl&&lvl.data&&lvl.data.currentLevel)||'aal1')==='aal2'){ refresh(false); } else { gateMfaChallenge(); }
      }).catch(function(){ refresh(false); }); };
    if(!codes.length){
      app.innerHTML='<div class="hud"><div class="gate"><h1>JARVIS OS</h1><span class="j" style="font-size:11px;letter-spacing:.2em;color:var(--green2)">MFA ENABLED ✓</span>'
        +'<p style="color:var(--amber);max-width:320px">Recovery codes couldn\'t be generated right now. You can create them later from the Security panel. Keep your authenticator app safe.</p>'
        +'<button class="gbtn" id="bcGo" style="background:var(--green);color:#05140b;border:none">Continue</button></div></div>';
      $('#bcGo').onclick=cont; return;
    }
    app.innerHTML='<div class="hud"><div class="gate"><h1>JARVIS OS</h1><span class="j" style="font-size:11px;letter-spacing:.2em;color:var(--green2)">MFA ENABLED ✓ — SAVE YOUR RECOVERY CODES</span>'
      +'<p style="color:var(--dim2);max-width:340px">Store these somewhere safe. Each works <b>once</b> if you ever lose your authenticator — a code resets MFA so you can sign back in. They won\'t be shown again.</p>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px 18px;font-family:inherit;font-size:15px;letter-spacing:.08em;color:var(--green2);background:var(--panel2);border:1px solid var(--line2);border-radius:10px;padding:14px 18px;margin:6px 0">'
      +codes.map(function(c){ return '<span>'+esc(c)+'</span>'; }).join('')+'</div>'
      +'<button class="gbtn" id="bcCopy" style="background:none;color:var(--dim2);border:1px solid var(--line2)">Copy codes</button>'
      +'<label style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--dim2);margin:10px 0"><input type="checkbox" id="bcAck"> I\'ve saved these codes</label>'
      +'<button class="gbtn" id="bcGo" style="background:var(--green);color:#05140b;border:none;opacity:.5" disabled>Enter command center</button></div></div>';
    $('#bcCopy').onclick=function(){ try{ navigator.clipboard.writeText(codes.join('\n')); $('#bcCopy').textContent='Copied ✓'; }catch(e){} };
    $('#bcAck').onchange=function(){ var g=$('#bcGo'); g.disabled=!this.checked; g.style.opacity=this.checked?'1':'.5'; };
    $('#bcGo').onclick=cont;
  }

  function gateMfaChallenge(){
    app.innerHTML='<div class="hud"><div class="gate"><h1>JARVIS OS</h1><span class="j" style="font-size:11px;letter-spacing:.2em">TWO-FACTOR REQUIRED</span>'
      +'<p style="color:var(--dim2)">Enter the 6-digit code from your authenticator app.</p>'
      +'<input id="mfaCode" type="text" inputmode="numeric" maxlength="6" placeholder="000000" style="width:200px;text-align:center;font-size:28px;letter-spacing:.3em;background:var(--panel2);border:1px solid var(--line2);color:var(--white);border-radius:8px;padding:10px;font-family:inherit;margin:8px 0">'
      +'<div id="mfaErr" style="color:var(--amber);font-size:12px;min-height:16px"></div>'
      +'<button class="gbtn" id="mfaGo" style="background:var(--green);color:#05140b;border:none">Authenticate</button>'
      +'<button style="all:unset;color:var(--amber);font-size:11px;cursor:pointer;margin-top:12px" id="mfaRecover">Lost your authenticator? Use a recovery code</button>'
      +'<button style="all:unset;color:var(--dim);font-size:11px;cursor:pointer;margin-top:8px" id="mfaSignOut">Sign out</button></div></div>';
    var authing=false;
    var doAuth=async function(){
      if(authing) return;
      var code=($('#mfaCode').value||'').replace(/\D/g,'');
      var btn=$('#mfaGo');
      if(code.length!==6){ $('#mfaErr').textContent='Enter the 6-digit code.'; return; }
      authing=true; btn.disabled=true; btn.textContent='Authenticating…'; $('#mfaErr').textContent='';
      var fail=function(m){ authing=false; btn.disabled=false; btn.textContent='Authenticate'; $('#mfaErr').textContent=m||'Couldn\'t authenticate — try again.'; };
      try{
        try{ await sb.auth.refreshSession(); }catch(e){}
        var factors=await sb.auth.mfa.listFactors();
        if(factors.error) throw factors.error;
        var totp=((factors.data||{}).totp)||[];
        var fid=totp[0] && totp[0].id;
        if(!fid){ fail('No authenticator enrolled — use a recovery code.'); return; }
        var ch=await sb.auth.mfa.challenge({factorId:fid});
        if(ch.error){ fail(ch.error.message||'Could not start a challenge.'); return; }
        var v=await sb.auth.mfa.verify({factorId:fid,challengeId:ch.data.id,code:code});
        if(v.error){
          var m=((v.error.message||'')+'').toLowerCase();
          fail(m.indexOf('expired')>=0 ? 'That code expired — wait for the next one and retry.'
                                       : 'Incorrect code. Check your authenticator app\'s clock is synced, then retry.');
          return;
        }
        if(v.data&&v.data.session&&v.data.session.access_token){ token=v.data.session.access_token; }
        _stepUpAt=Date.now(); mfaNeedsEnroll=false; refresh(false);
      }catch(e){ fail((e&&e.message)||'Authentication error — try again, or use a recovery code.'); }
    };
    $('#mfaGo').onclick=doAuth;
    $('#mfaCode').addEventListener('keydown',function(e){ if(e.key==='Enter') doAuth(); });
    $('#mfaRecover').onclick=gateMfaRecover;
    $('#mfaSignOut').onclick=function(){ sb.auth.signOut().then(function(){ location.reload(); }); };
  }

  // Break-glass: a one-time recovery code clears MFA so a locked-out admin can
  // sign back in (AAL1) and re-enroll. Unauthenticated by design — the server
  // gates on allowlisted email + a valid unused code.
  function gateMfaRecover(){
    var em=(user&&user.email)||'';
    app.innerHTML='<div class="hud"><div class="gate"><h1>JARVIS OS</h1><span class="j" style="font-size:11px;letter-spacing:.2em">ACCOUNT RECOVERY</span>'
      +'<p style="color:var(--dim2);max-width:320px">Enter your admin email and one of your saved recovery codes. This resets MFA so you can sign in and set it up again.</p>'
      +'<input id="rcEmail" type="email" placeholder="admin email" value="'+esc(em)+'" style="width:240px;text-align:center;font-size:14px;background:var(--panel2);border:1px solid var(--line2);color:var(--white);border-radius:8px;padding:10px;font-family:inherit;margin:6px 0">'
      +'<input id="rcCode" type="text" placeholder="recovery code (xxxx-xxxx)" style="width:240px;text-align:center;font-size:15px;letter-spacing:.06em;background:var(--panel2);border:1px solid var(--line2);color:var(--white);border-radius:8px;padding:10px;font-family:inherit;margin:6px 0">'
      +'<div id="rcMsg" style="font-size:12px;min-height:16px;margin:4px 0"></div>'
      +'<button class="gbtn" id="rcGo" style="background:var(--amber);color:#1a1206;border:none">Reset MFA</button>'
      +'<button style="all:unset;color:var(--dim);font-size:11px;cursor:pointer;margin-top:10px" id="rcBack">Back</button></div></div>';
    $('#rcBack').onclick=gateMfaChallenge;
    $('#rcGo').onclick=async function(){
      var email=($('#rcEmail').value||'').trim(), code=($('#rcCode').value||'').trim();
      var msg=$('#rcMsg'), btn=$('#rcGo');
      if(!email||!code){ msg.style.color='var(--amber)'; msg.textContent='Enter your email and a recovery code.'; return; }
      btn.disabled=true; btn.textContent='Resetting…'; msg.textContent='';
      try{
        var r=await fetch('/jarvis/mfa/recover',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({email:email,code:code})});
        var d=await r.json();
        if(d&&d.ok){
          msg.style.color='var(--green2)'; msg.textContent=d.message||'MFA reset.';
          btn.textContent='Done'; mfaNeedsEnroll=false;
          setTimeout(function(){ sb.auth.signOut().then(function(){ location.reload(); }); }, 1800);
        } else {
          msg.style.color='var(--amber)'; msg.textContent=(d&&d.message)||'Recovery failed.';
          btn.disabled=false; btn.textContent='Reset MFA';
        }
      }catch(e){ msg.style.color='var(--amber)'; msg.textContent='Recovery failed — try again.'; btn.disabled=false; btn.textContent='Reset MFA'; }
    };
  }

  async function jvStepUp(){ // Returns true if step-up satisfied (fresh or just completed)
    if(stepUpFresh()) return true;
    // If the session is ALREADY AAL2 (the admin passed MFA at login), that IS a
    // strong auth — accept it without a fragile re-verify (TOTP re-entry was
    // failing on code timing/reuse and stranding the action). Only AAL1 sessions
    // fall through to the modal below.
    try{
      var lvl=await sb.auth.mfa.getAuthenticatorAssuranceLevel();
      if(((lvl&&lvl.data&&lvl.data.currentLevel)||'aal1')==='aal2'){ _stepUpAt=Date.now(); return true; }
    }catch(e){}
    return new Promise(function(resolve){
      var sheet=document.createElement('div'); sheet.className='sheet';
      sheet.innerHTML='<div class="sheetcard"><h3>Step-up required</h3><div class="gn">This action requires a fresh authentication. Enter your TOTP code to continue.</div>'
        +'<input id="suCode" type="text" inputmode="numeric" maxlength="6" placeholder="000000" style="font-size:22px;letter-spacing:.3em;text-align:center">'
        +'<div id="suErr" style="color:var(--amber);font-size:12px;min-height:14px;margin-top:6px"></div>'
        +'<button class="confirm" id="suGo">Confirm</button><button class="cancel" id="suCancel">Cancel</button></div>';
      document.body.appendChild(sheet); requestAnimationFrame(function(){ sheet.classList.add('open'); });
      var close=function(ok){ sheet.classList.remove('open'); setTimeout(function(){ try{sheet.remove();}catch(e){} },220); resolve(ok); };
      $('#suCancel',sheet).onclick=function(){ close(false); };
      var busy=false;
      var doStepUp=async function(){
        if(busy) return;
        var code=($('#suCode',sheet).value||'').replace(/\D/g,'');
        var err=$('#suErr',sheet), btn=$('#suGo',sheet);
        if(code.length!==6){ err.textContent='Enter the 6-digit code.'; return; }
        busy=true; btn.disabled=true; btn.textContent='Verifying…'; err.textContent='';
        var fail=function(m){ busy=false; btn.disabled=false; btn.textContent='Confirm'; err.textContent=m||'Verification failed — try again.'; };
        try{
          // The session token can be expired (autorefresh may lag in a PWA) — a
          // throw here used to silently no-op the button. Refresh first, then verify.
          try{ await sb.auth.refreshSession(); }catch(e){}
          var factors=await sb.auth.mfa.listFactors();
          if(factors.error) throw factors.error;
          var totp=((factors.data||{}).totp)||[];
          var fid=totp[0] && totp[0].id;
          if(!fid){ fail('No authenticator enrolled.'); return; }
          var ch=await sb.auth.mfa.challenge({factorId:fid});
          if(ch.error){ fail(ch.error.message||'Could not start a challenge.'); return; }
          var v=await sb.auth.mfa.verify({factorId:fid,challengeId:ch.data.id,code:code});
          if(v.error){
            // Already stepped up? Accept a strong session rather than blocking.
            var lvl=await sb.auth.mfa.getAuthenticatorAssuranceLevel();
            if(((lvl.data||{}).currentLevel)==='aal2'){ _stepUpAt=Date.now(); close(true); return; }
            var m=((v.error.message||'')+'').toLowerCase();
            fail(m.indexOf('expired')>=0 ? 'That code expired — wait for the next one and retry.'
                                         : 'Incorrect code. Check your authenticator app\'s clock is synced, then retry.');
            return;
          }
          if(v.data&&v.data.session&&v.data.session.access_token){ token=v.data.session.access_token; }
          _stepUpAt=Date.now(); close(true);
        }catch(e){ fail((e&&e.message)||'Verification error — try again.'); }
      };
      $('#suGo',sheet).onclick=doStepUp;
      $('#suCode',sheet).addEventListener('keydown',function(e){ if(e.key==='Enter') doStepUp(); });
    });
  }

  // Security + pending panels — refresh after each render()
  var _secStatus=null, _pendingActions=[], mfaNeedsEnroll=false;
  function secRefreshPanels(){
    fetch('/jarvis/security/status',{headers:{'Authorization':'Bearer '+token}})
      .then(function(r){ return r.ok?r.json():null; })
      .then(function(d){ if(d){ _secStatus=d; _renderSecPanel(); } }).catch(function(){});
    fetch('/jarvis/actions/pending',{headers:{'Authorization':'Bearer '+token}})
      .then(function(r){ return r.ok?r.json():null; })
      .then(function(d){ if(d){ _pendingActions=d.actions||[]; _renderPendingPanel(); } }).catch(function(){});
  }

  function _renderSecPanel(){
    var el=document.getElementById('secPanel'); if(!el||!_secStatus) return;
    var on=_secStatus.actions_enabled;
    el.innerHTML='<p class="lbl">Security<span class="ln"></span></p>'
      +(mfaNeedsEnroll ? '' : '<div class="row"><span>Recovery codes</span><b id="recoveryBtn" style="color:var(--green2);cursor:pointer">Create</b></div>')
      +'<div class="row"><span>Actions</span><b style="color:'+(on?'var(--green2)':'var(--amber)')+'">'+(on?'Enabled':'KILL SWITCH ON')+'</b></div>'
      +'<div class="row"><span>Pending approvals</span><b>'+(_secStatus.pending_count||0)+'</b></div>'
      +'<div class="row"><span>Session AAL</span><b style="color:'+(mfaNeedsEnroll?'var(--amber)':'var(--green2)')+'">'+(mfaNeedsEnroll?'AAL1 · no MFA':'AAL2 ✓')+'</b></div>'
      +(mfaNeedsEnroll
         ? '<button class="btn" id="enrollMfaBtn" style="margin-top:8px;width:100%;justify-content:center;color:var(--amber)">Secure your account — enable MFA</button>'
         : '<div class="rxcap">Never ever ever touch the red button</div>'
           +'<div class="rxrow">'
           +(on
             ? '<button id="killSwitchBtn" class="pushbtn">'+pushButtonInner('Push the<br>Button')+'</button>'
             : '<button id="killSwitchBtn" class="rxbtn blue">'+ringSVG('#39ff7a','rxk')+'<span class="rxcore"><b>Restore</b></span></button>')
           +'</div>');
    if(mfaNeedsEnroll){ var eb=$('#enrollMfaBtn'); if(eb) eb.onclick=function(){ gateMfaEnroll(); }; return; }
    var rb=$('#recoveryBtn'); if(rb) rb.onclick=async function(){
      var ok=await jvConfirm({title:'Regenerate recovery codes?',body:'This replaces your existing recovery codes with a fresh set. Old codes stop working immediately.',confirm:'Generate new codes'});
      if(ok) showBackupCodes();
    };
    $('#killSwitchBtn').onclick=async function(){
      var newState=!on;
      if(!newState) jvAlarmStart();   // arming the nuke (disabling) → emergency alarm until decided
      var ok=await jvConfirm(newState
        ? {title:'Re-enable actions?',body:'This lifts the kill switch and lets Jarvis run actions again.',confirm:'Restore actions'}
        : {title:'NUKE IT — disable all actions?',body:'The kill switch stops Jarvis from running ANY action (send, post, deploy, spend). Read-only dashboards keep working. You can restore it here.',confirm:'NUKE IT',danger:true});
      jvAlarmStop();                  // stops on either Confirm or Cancel
      if(!ok) return;
      fetch('/jarvis/security/kill-switch',{method:'POST',headers:{'content-type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({enabled:newState})})
        .then(function(r){ return r.json(); }).then(function(){ secRefreshPanels(); }).catch(function(){});
    };
  }

  // Emergency alarm for the red NUKE button — loops until the confirm is decided.
  var jvAlarm=null;
  function jvAlarmStart(){ try{ if(!jvAlarm){ jvAlarm=new Audio('/alarm.MP3'); jvAlarm.loop=true; } jvAlarm.currentTime=0; jvAlarm.play().catch(function(){}); }catch(e){} }
  function jvAlarmStop(){ try{ if(jvAlarm){ jvAlarm.pause(); jvAlarm.currentTime=0; } }catch(e){} }

  // Simple confirm sheet (Confirm/Cancel) — replaces step-up for self-actions.
  function jvConfirm(o){
    o=o||{};
    return new Promise(function(resolve){
      var sheet=document.createElement('div'); sheet.className='sheet';
      sheet.innerHTML='<div class="sheetcard"><h3>'+esc(o.title||'Are you sure?')+'</h3>'
        +'<div class="gn">'+esc(o.body||'')+'</div>'
        +'<button class="confirm" id="cfGo"'+(o.danger?' style="background:var(--red);color:#fff"':'')+'>'+esc(o.confirm||'Confirm')+'</button>'
        +'<button class="cancel" id="cfNo">Cancel</button></div>';
      document.body.appendChild(sheet); requestAnimationFrame(function(){ sheet.classList.add('open'); });
      var close=function(ok){ sheet.classList.remove('open'); setTimeout(function(){ try{sheet.remove();}catch(e){} },220); resolve(ok); };
      $('#cfGo',sheet).onclick=function(){ close(true); };
      $('#cfNo',sheet).onclick=function(){ close(false); };
    });
  }

  function _renderPendingPanel(){
    var el=document.getElementById('pendingPanel'); if(!el) return;
    if(!_pendingActions.length){ el.innerHTML='<p class="lbl">Pending approvals<span class="ln"></span></p><div class="ph">No pending actions.</div>'; return; }
    el.innerHTML='<p class="lbl">Pending approvals<span class="ln"></span></p>'
      +_pendingActions.map(function(a){
        return '<div class="row" style="flex-direction:column;align-items:flex-start;gap:4px;border-bottom:1px solid rgba(255,255,255,.04);padding:7px 0">'
          +'<span style="font-size:11px;color:var(--white)">'+esc(a.preview_text)+'</span>'
          +'<span style="font-size:9px;color:var(--dim)">Tier '+a.tier+' · '+a.type+'</span>'
          +'<div style="display:flex;gap:6px;margin-top:2px">'
          +'<button class="btn" style="color:var(--green)" data-id="'+esc(a.id)+'" data-act="approve">Approve</button>'
          +'<button class="btn" style="color:var(--red)" data-id="'+esc(a.id)+'" data-act="deny">Deny</button>'
          +'</div></div>';
      }).join('');
    Array.prototype.forEach.call(el.querySelectorAll('[data-act]'),function(btn){
      btn.onclick=async function(){
        var act=btn.getAttribute('data-act'), id=btn.getAttribute('data-id');
        if(act==='approve'){ var ok=await jvStepUp(); if(!ok) return; }
        fetch('/jarvis/actions/'+act,{method:'POST',headers:{'content-type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({action_id:id})})
          .then(function(){ secRefreshPanels(); }).catch(function(){});
      };
    });
  }
})();
</script>
