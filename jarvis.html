<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>QUWWAA HQ</title>
<meta name="robots" content="noindex,nofollow">
<link rel="manifest" href="/jarvis-manifest.json">
<meta name="theme-color" content="#000000">
<link rel="apple-touch-icon" href="/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="QUWWAA HQ">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{ color-scheme:dark; --serif:"Fraunces",Georgia,serif; --sans:"Inter",-apple-system,system-ui,sans-serif;
    --bg:#0d0a07; --ink:#ffe9d6; --muted:#a06a3a; --sub:#cba98f; --orange:#d98026; --line:rgba(217,128,38,.22); }
  *{ margin:0; padding:0; box-sizing:border-box; font-family:var(--sans); -webkit-tap-highlight-color:transparent; }
  html,body{ background:var(--bg); color:var(--ink); min-height:100%; }
  body{ background-image:radial-gradient(1200px 500px at 50% -10%, rgba(217,128,38,.10), transparent 70%);
    padding:max(18px,env(safe-area-inset-top)) 16px calc(40px + env(safe-area-inset-bottom)); max-width:560px; margin:0 auto; }
  .top{ display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }
  .brand{ font-family:var(--serif); font-weight:500; font-size:24px; letter-spacing:.5px; color:#ffd9c4; }
  .brand b{ color:var(--orange); font-weight:500; }
  .reload{ background:rgba(217,128,38,.14); border:1px solid rgba(217,128,38,.5); color:#ffce9a; border-radius:10px;
    padding:8px 12px; font:inherit; font-size:13px; cursor:pointer; display:flex; align-items:center; gap:6px; }
  .reload:active{ filter:brightness(1.15); } .reload.spin svg{ animation:spin 1s linear infinite; }
  .reload svg{ width:14px; height:14px; } @keyframes spin{ to{ transform:rotate(360deg); } }
  .stamp{ font-size:11.5px; color:var(--muted); margin:2px 0 16px; }
  .grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .card{ position:relative; background:linear-gradient(165deg, rgba(40,28,18,.55), rgba(18,13,9,.92));
    border:1px solid var(--line); border-radius:16px; padding:15px 15px 14px; min-height:128px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.05), 0 10px 26px rgba(0,0,0,.4); overflow:hidden; }
  .card.wide{ grid-column:1 / -1; }
  .clabel{ display:flex; align-items:center; gap:7px; font-size:11px; letter-spacing:.6px; text-transform:uppercase; color:var(--muted); margin-bottom:9px; }
  .clabel svg{ width:14px; height:14px; stroke:currentColor; fill:none; stroke-width:1.7; }
  .big{ font-family:var(--serif); font-weight:500; font-size:34px; line-height:1; color:#fff3e9; }
  .big small{ font-size:16px; color:var(--sub); font-family:var(--sans); font-weight:500; }
  .rows{ margin-top:11px; display:flex; flex-direction:column; gap:5px; }
  .row{ display:flex; justify-content:space-between; font-size:12.5px; color:var(--sub); }
  .row b{ color:#ffe2cf; font-weight:600; }
  .stub{ font-size:12px; color:var(--muted); line-height:1.5; margin-top:6px; }
  .spark{ position:absolute; right:12px; top:12px; width:78px; height:30px; opacity:.9; }
  .brief{ width:100%; margin-top:16px; background:linear-gradient(135deg,#e89a4a,#c06a18); color:#1c1206; border:none;
    border-radius:14px; padding:15px; font:inherit; font-weight:700; font-size:16px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:9px; box-shadow:0 8px 24px rgba(217,128,38,.3); }
  .brief:disabled{ opacity:.6; } .brief svg{ width:19px; height:19px; }
  .gate{ min-height:72vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:14px; }
  .gate h1{ font-family:var(--serif); font-weight:500; font-size:30px; color:#ffd9c4; }
  .gate h1 b{ color:var(--orange); font-weight:500; } .gate p{ color:var(--sub); font-size:14px; max-width:300px; line-height:1.5; }
  .gbtn{ display:flex; align-items:center; gap:10px; background:#fff; color:#202124; border:none; border-radius:12px;
    padding:13px 20px; font:inherit; font-weight:600; font-size:15px; cursor:pointer; }
  .gbtn svg{ width:18px; height:18px; }
  .err{ color:#ff9b6b; font-size:13.5px; }
  .hint{ font-size:12px; color:var(--muted); }
  .skel{ color:#6a4a2a; }
</style>
</head>
<body>
<div id="app"><div class="stamp">Starting QUWWAA HQ…</div></div>

<script>
(function(){
  var $=function(s,r){return (r||document).querySelector(s);};
  var app=$('#app'), sb=null, token=null, user=null, stats=null;
  var ICON={
    traffic:'<svg viewBox="0 0 24 24"><path d="M3 17l5-5 4 4 7-8"/><path d="M16 8h4v4"/></svg>',
    revenue:'<svg viewBox="0 0 24 24"><path d="M12 2v20"/><path d="M17 6.5C17 4.6 14.8 4 12 4S7 4.9 7 7s2.2 2.6 5 3 5 1 5 3-2.2 3-5 3-5-.8-5-2.6"/></svg>',
    members:'<svg viewBox="0 0 24 24"><circle cx="9" cy="8" r="3.2"/><path d="M3.5 20c0-3.3 2.7-5 5.5-5s5.5 1.7 5.5 5"/><path d="M16 5.2A3 3 0 0 1 16 11M20.5 20c0-2.6-1.6-4.2-3.6-4.8"/></svg>',
    news:'<svg viewBox="0 0 24 24"><path d="M3 5h18v14H3z"/><path d="M3 8l9 5 9-5"/></svg>',
    play:'<svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M8 5v14l11-7z"/></svg>',
    refresh:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 4v5h-5"/></svg>',
    g:'<svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0 0 12 23z"/><path fill="#FBBC05" d="M5.84 14.1a6.6 6.6 0 0 1 0-4.2V7.06H2.18a11 11 0 0 0 0 9.88l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1A11 11 0 0 0 2.18 7.06l3.66 2.84C6.71 7.31 9.14 5.38 12 5.38z"/></svg>'
  };
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c];}); }
  function fmtMoney(n,cur){ if(n==null) return '—'; var s=(cur||'usd').toUpperCase()==='USD'?'$':'';
    return s+Number(n).toLocaleString(undefined,{maximumFractionDigits:0}); }
  function num(n){ return n==null?'—':Number(n).toLocaleString(); }
  function pct(n){ return n==null?'—':(Math.round(n*1000)/10)+'%'; }
  function dur(sec){ if(sec==null) return '—'; var m=Math.floor(sec/60), s=sec%60; return m?(m+'m '+s+'s'):(s+'s'); }

  function loadScript(src){ return new Promise(function(res,rej){ var s=document.createElement('script'); s.src=src; s.onload=res; s.onerror=function(){rej(new Error('load'));}; document.head.appendChild(s); }); }

  function sparkline(trend){
    if(!trend || trend.length<2) return '';
    var vals=trend.map(function(d){return d.users||0;}), max=Math.max.apply(null,vals)||1, min=Math.min.apply(null,vals);
    var w=78,h=30, n=vals.length; var pts=vals.map(function(v,i){
      var x=(i/(n-1))*w, y=h-2-((v-min)/((max-min)||1))*(h-4); return x.toFixed(1)+','+y.toFixed(1); }).join(' ');
    return '<svg class="spark" viewBox="0 0 '+w+' '+h+'"><polyline points="'+pts+'" fill="none" stroke="#e89a4a" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  }

  function render(){
    var m=stats.members||{}, r=stats.revenue||{}, t=stats.traffic||{}, n=stats.newsletter||{};
    var when=stats.generated_at ? new Date(stats.generated_at) : new Date();
    var trafficBody = t.available ?
        ('<div class="big">'+num(t.users_today)+'</div>'+sparkline(t.trend)+
         '<div class="rows"><div class="row"><span>New today</span><b>'+num(t.new_users_today)+'</b></div>'+
         '<div class="row"><span>Active · 7d</span><b>'+num(t.active_7d)+'</b></div>'+
         '<div class="row"><span>Avg engagement</span><b>'+dur(t.avg_engagement_sec)+'</b></div></div>')
      : ('<div class="big skel">—</div><div class="stub">Live traffic activates once the GA service-account key is on the server.</div>');

    app.innerHTML=
      '<div class="top"><div class="brand">QUWWAA <b>HQ</b></div>'
        +'<button class="reload" id="reload">'+ICON.refresh+'Reload</button></div>'
      +'<div class="stamp" id="stamp">Updated '+when.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})+'</div>'
      +'<div class="grid">'
        +'<div class="card"><div class="clabel">'+ICON.traffic+'Traffic</div>'+trafficBody+'</div>'
        +'<div class="card"><div class="clabel">'+ICON.revenue+'Revenue</div>'
          +'<div class="big">'+fmtMoney(r.mrr,r.currency)+' <small>MRR</small></div>'
          +'<div class="rows"><div class="row"><span>Active subs</span><b>'+num(r.active)+'</b></div>'
          +'<div class="row"><span>Trialing</span><b>'+num(r.trialing)+'</b></div>'
          +'<div class="row"><span>This month</span><b>'+fmtMoney(r.revenue_month,r.currency)+'</b></div>'
          +'<div class="row"><span>New cust · 7d</span><b>'+num(r.new_customers_week)+'</b></div></div></div>'
        +'<div class="card"><div class="clabel">'+ICON.members+'Members</div>'
          +'<div class="big">'+num(m.total)+'</div>'
          +'<div class="rows"><div class="row"><span>Free</span><b>'+num(m.free)+'</b></div>'
          +'<div class="row"><span>Trial / Active</span><b>'+num(m.trialing)+' / '+num(m.active)+'</b></div>'
          +'<div class="row"><span>New today</span><b>'+num(m.new_today)+'</b></div>'
          +'<div class="row"><span>Brief subs</span><b>'+num(m.brief_subscribed)+'</b></div></div></div>'
        +'<div class="card"><div class="clabel">'+ICON.news+'Newsletter</div>'
          +'<div class="big">'+num(n.subscribers)+'</div>'
          +'<div class="rows"><div class="row"><span>New · 7d</span><b>'+num(n.new_this_week)+'</b></div>'
          + (n.last_broadcast ?
              ('<div class="row"><span>Last open</span><b>'+pct(n.last_broadcast.open_rate)+'</b></div>'
              +'<div class="row"><span>Last click</span><b>'+pct(n.last_broadcast.click_rate)+'</b></div>')
              : '<div class="row"><span>Last broadcast</span><b>—</b></div>')
          +'</div></div>'
      +'</div>'
      +'<button class="brief" id="brief">'+ICON.play+'Brief me</button>';

    $('#reload').onclick=function(){ refresh(true); };
    $('#brief').onclick=briefMe;
  }

  function briefText(){
    var m=stats.members||{}, r=stats.revenue||{}, t=stats.traffic||{}, n=stats.newsletter||{};
    var lines=[]; var hour=new Date().getHours();
    lines.push((hour<12?'Good morning':hour<17?'Good afternoon':'Good evening')+', sir. Here is where things stand.');
    if(r.mrr!=null) lines.push('Recurring revenue is '+fmtMoney(r.mrr,r.currency).replace('$','')+' dollars a month, with '+num(r.active)+' active subscribers and '+num(r.trialing)+' on trial.');
    if(m.total!=null) lines.push('You have '+num(m.total)+' members, '+num(m.new_today)+' new today, and '+num(m.brief_subscribed)+' on the morning brief.');
    if(t.available && t.users_today!=null) lines.push(num(t.users_today)+' people visited the site today, '+num(t.new_users_today)+' of them new.');
    if(n.subscribers!=null) lines.push('The newsletter sits at '+num(n.subscribers)+' subscribers.');
    lines.push('That is the picture, sir.');
    return lines.join(' ');
  }
  var audio=null;
  function briefMe(){
    var btn=$('#brief'); if(!stats) return;
    btn.disabled=true;
    var text=briefText();
    if(!audio){ audio=new Audio(); }
    fetch('/speak',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({text:text})})
      .then(function(r){ if(!r.ok) throw new Error('tts'); return r.blob(); })
      .then(function(b){ var url=URL.createObjectURL(b); audio.src=url; audio.onended=function(){ btn.disabled=false; URL.revokeObjectURL(url); };
        audio.onerror=function(){ btn.disabled=false; }; return audio.play(); })
      .catch(function(){ btn.disabled=false; try{ var u=new SpeechSynthesisUtterance(text); speechSynthesis.speak(u); }catch(e){} });
  }

  function refresh(spin){
    var rb=$('#reload'); if(rb&&spin) rb.classList.add('spin');
    return fetch('/jarvis/stats',{cache:'no-store',headers:{'Authorization':'Bearer '+token}})
      .then(function(r){
        if(r.status===401||r.status===403){ throw {code:'forbidden'}; }
        if(!r.ok) throw {code:'err'};
        return r.json();
      })
      .then(function(d){ stats=d; render(); })
      .catch(function(e){
        if(e&&e.code==='forbidden'){ gateForbidden(); }
        else { app.innerHTML='<div class="gate"><div class="brand">QUWWAA <b>HQ</b></div><p class="err">Couldn\'t load the briefing. Tap to retry.</p><button class="gbtn" id="retry">Retry</button></div>'; var rt=$('#retry'); if(rt) rt.onclick=function(){ boot(); }; }
      });
  }

  function gateSignIn(){
    app.innerHTML='<div class="gate"><h1>QUWWAA <b>HQ</b></h1><p>Your command center. Sign in to continue.</p>'
      +'<button class="gbtn" id="gi">'+ICON.g+'Continue with Google</button></div>';
    $('#gi').onclick=function(){
      try{ sb.auth.signInWithOAuth({ provider:'google', options:{ redirectTo: location.origin + location.pathname } }); }catch(e){}
    };
  }
  function gateForbidden(){
    app.innerHTML='<div class="gate"><h1>QUWWAA <b>HQ</b></h1><p class="err">This account isn\'t on the admin list.</p>'
      +'<p class="hint">Signed in as '+esc((user&&user.email)||'')+'.</p>'
      +'<button class="gbtn" id="so">Sign out</button></div>';
    $('#so').onclick=function(){ try{ sb.auth.signOut().then(function(){ location.reload(); }); }catch(e){ location.reload(); } };
  }

  function boot(){
    app.innerHTML='<div class="stamp">Loading…</div>';
    fetch('/config',{cache:'no-store'}).then(function(r){return r.json();}).then(function(cfg){
      if(!cfg||!cfg.supabaseUrl){ app.innerHTML='<div class="gate"><p class="err">Backend not configured.</p></div>'; return; }
      loadScript('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2').then(function(){
        sb=window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey,
          {auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true}});
        sb.auth.getSession().then(function(res){
          var session=res&&res.data&&res.data.session;
          if(!session){ gateSignIn(); return; }
          user=session.user; token=session.access_token;
          refresh(false);
        });
        sb.auth.onAuthStateChange(function(_e,session){
          if(session){ user=session.user; token=session.access_token; if(!stats) refresh(false); }
        });
      }).catch(function(){ app.innerHTML='<div class="gate"><p class="err">Couldn\'t start. Retry.</p></div>'; });
    }).catch(function(){ app.innerHTML='<div class="gate"><p class="err">Offline.</p></div>'; });
  }

  // Installable PWA — only register the cockpit SW on the hq subdomain so it never
  // clashes with the main app's service worker when reached via /jarvis for testing.
  if('serviceWorker' in navigator && location.hostname.indexOf('hq.')===0){
    window.addEventListener('load', function(){ navigator.serviceWorker.register('/jarvis-sw.js').catch(function(){}); });
  }
  boot();
})();
</script>
</body>
</html>
