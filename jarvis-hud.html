<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QUWWAA</title>
<style>
  :root { color-scheme: dark; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; }
  body {
    background:#04070d;
    color:#9fd8e8;
    font-family:"Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overflow:hidden;
    display:flex; flex-direction:column;
  }
  body::before {
    content:""; position:fixed; inset:0; pointer-events:none;
    background:
      radial-gradient(ellipse at 50% 30%, rgba(20,90,120,.18), transparent 60%),
      repeating-linear-gradient(0deg, transparent 0 3px, rgba(80,200,255,.012) 3px 4px);
  }
  /* ---------- header ---------- */
  header {
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 22px; border-bottom:1px solid rgba(80,200,255,.15);
    font-size:11px; letter-spacing:2px; text-transform:uppercase; color:#5fb3cc;
  }
  header .title { font-size:15px; letter-spacing:6px; color:#bfeaf7; text-shadow:0 0 12px rgba(80,200,255,.6); }
  header .sub { color:#3e7f96; }
  #clock { font-variant-numeric:tabular-nums; }
  /* ---------- reactor ---------- */
  #reactorWrap { display:flex; flex-direction:column; align-items:center; padding:18px 0 6px; }
  #reactor { position:relative; width:120px; height:120px; cursor:pointer; }
  #reactor .ring { position:absolute; border-radius:50%; border:1px solid rgba(90,210,255,.35); }
  #reactor .r1 { inset:0; border-width:2px; animation:spin 14s linear infinite; border-top-color:rgba(150,230,255,.9); }
  #reactor .r2 { inset:12px; animation:spin 9s linear infinite reverse; border-bottom-color:rgba(150,230,255,.8); }
  #reactor .r3 { inset:26px; border-style:dashed; animation:spin 22s linear infinite; }
  #reactor .core {
    position:absolute; inset:40px; border-radius:50%;
    background:radial-gradient(circle, #eafcff 0%, #7fdcff 35%, #1493c8 70%, #073449 100%);
    box-shadow:0 0 24px 6px rgba(90,210,255,.55), 0 0 70px 18px rgba(40,150,210,.25);
    animation:pulse 3.2s ease-in-out infinite;
  }
  body.listening #reactor .core { animation:pulse .7s ease-in-out infinite; box-shadow:0 0 34px 10px rgba(120,235,255,.85), 0 0 90px 26px rgba(60,180,240,.4); }
  body.speaking  #reactor .core { animation:pulse 1.1s ease-in-out infinite; }
  body.thinking  #reactor .r3  { animation:spin 1.2s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  @keyframes pulse { 0%,100%{ transform:scale(1);} 50%{ transform:scale(1.07);} }
  #status { margin-top:10px; font-size:11px; letter-spacing:3px; text-transform:uppercase; color:#5fb3cc; min-height:14px; }
  /* ---------- log ---------- */
  #log {
    flex:1; overflow-y:auto; padding:14px 22px; display:flex; flex-direction:column; gap:10px;
    scrollbar-width:thin; scrollbar-color:#1a4a5e transparent;
  }
  .msg { max-width:78%; padding:9px 13px; border-radius:4px; font-size:14px; line-height:1.45; white-space:pre-wrap; }
  .msg.user {
    align-self:flex-end; color:#ffd9a0;
    border:1px solid rgba(255,180,80,.3); background:rgba(255,160,60,.06);
    border-right:3px solid rgba(255,180,80,.6);
  }
  .msg.jarvis {
    align-self:flex-start; color:#c9eef9;
    border:1px solid rgba(90,210,255,.25); background:rgba(60,180,240,.05);
    border-left:3px solid rgba(90,210,255,.6);
  }
  .msg .who { display:block; font-size:9px; letter-spacing:2px; text-transform:uppercase; opacity:.55; margin-bottom:3px; }
  /* ---------- controls ---------- */
  #controls {
    display:flex; gap:10px; align-items:center;
    padding:14px 22px 18px; border-top:1px solid rgba(80,200,255,.15);
  }
  #micBtn {
    width:52px; height:52px; border-radius:50%; flex:none; cursor:pointer;
    border:1px solid rgba(90,210,255,.5); background:rgba(60,180,240,.08); color:#9fe5ff;
    font-size:20px; transition:all .2s;
  }
  #micBtn:hover { background:rgba(90,210,255,.18); box-shadow:0 0 14px rgba(90,210,255,.4); }
  body.listening #micBtn { background:rgba(255,90,90,.18); border-color:rgba(255,120,120,.7); color:#ffb3b3; box-shadow:0 0 16px rgba(255,90,90,.5); }
  #micBtn:disabled { opacity:.3; cursor:not-allowed; }
  #textIn {
    flex:1; padding:13px 16px; font-size:14px; color:#d6f3fc;
    background:rgba(20,60,80,.25); border:1px solid rgba(80,200,255,.25); border-radius:4px; outline:none;
  }
  #textIn:focus { border-color:rgba(120,230,255,.6); box-shadow:0 0 10px rgba(80,200,255,.25); }
  #sendBtn, #voiceToggle {
    padding:12px 16px; cursor:pointer; font-size:12px; letter-spacing:1px; text-transform:uppercase;
    border:1px solid rgba(90,210,255,.4); background:rgba(60,180,240,.08); color:#9fe5ff; border-radius:4px;
  }
  #sendBtn:hover, #voiceToggle:hover { background:rgba(90,210,255,.18); }
  #voiceToggle.off { opacity:.4; }
</style>
</head>
<body>
<header>
  <span class="sub" id="clock">--:--:--</span>
  <span class="title">QUWWAA</span>
  <span class="sub" id="sysline">SYSTEMS NOMINAL</span>
</header>

<div id="reactorWrap">
  <div id="reactor" title="Tap to speak">
    <div class="ring r1"></div><div class="ring r2"></div><div class="ring r3"></div>
    <div class="core"></div>
  </div>
  <div id="status">STANDING BY</div>
</div>

<div id="log"></div>

<div id="controls">
  <button id="micBtn" title="Voice input">🎙</button>
  <input id="textIn" type="text" placeholder="Press Fn twice for Dictation, or type a command, sir..." autocomplete="off" autofocus>
  <button id="sendBtn">Send</button>
  <button id="voiceToggle" title="Toggle spoken replies">🔊 Voice</button>
</div>

<script>
(function(){
  const $ = id => document.getElementById(id);
  const log = $('log'), statusEl = $('status'), micBtn = $('micBtn'),
        textIn = $('textIn'), sendBtn = $('sendBtn'), voiceToggle = $('voiceToggle');

  // ---------- clock ----------
  function tick(){
    const d = new Date();
    $('clock').textContent = d.toLocaleTimeString('en-GB');
    $('sysline').textContent = d.toLocaleDateString('en-GB',{weekday:'short',day:'2-digit',month:'short',year:'numeric'}).toUpperCase();
  }
  tick(); setInterval(tick, 1000);

  // ---------- state ----------
  let history = [];
  try { history = JSON.parse(localStorage.getItem('quwwaa_history')||'[]'); } catch(e){}
  let voiceOn = localStorage.getItem('quwwaa_voice') !== 'off';
  let busy = false;

  function setVoiceUI(){ voiceToggle.classList.toggle('off', !voiceOn); voiceToggle.textContent = voiceOn ? '🔊 Voice' : '🔇 Muted'; }
  setVoiceUI();
  voiceToggle.onclick = () => { voiceOn = !voiceOn; localStorage.setItem('quwwaa_voice', voiceOn?'on':'off'); setVoiceUI(); if(!voiceOn) speechSynthesis.cancel(); };

  function setStatus(t){ statusEl.textContent = t; }
  function mode(m){ document.body.className = m||''; }

  function addMsg(role, text, save=true){
    const div = document.createElement('div');
    div.className = 'msg ' + (role==='user'?'user':'jarvis');
    const who = document.createElement('span');
    who.className = 'who'; who.textContent = role==='user' ? 'MR. DEAN' : 'QUWWAA';
    div.appendChild(who);
    div.appendChild(document.createTextNode(text));
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
    if(save){
      history.push({role, text});
      if(history.length > 40) history = history.slice(-40);
      try { localStorage.setItem('quwwaa_history', JSON.stringify(history)); } catch(e){}
    }
  }

  // restore history
  if(history.length){ history.forEach(m => addMsg(m.role, m.text, false)); }
  else { addMsg('jarvis', 'Good day, sir. QUWWAA online and at your service. All systems are operational. How may I assist you?', true); }

  // ---------- speech synthesis ----------
  let britishVoice = null;
  function pickVoice(){
    const vs = speechSynthesis.getVoices();
    britishVoice = vs.find(v=>/daniel/i.test(v.name) && /en/i.test(v.lang))
                || vs.find(v=>v.lang==='en-GB' && /male|arthur|oliver/i.test(v.name))
                || vs.find(v=>v.lang==='en-GB')
                || vs.find(v=>/^en/.test(v.lang)) || null;
  }
  pickVoice();
  if(speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = pickVoice;

  function speak(text){
    if(!voiceOn || !('speechSynthesis' in window)) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    if(britishVoice) u.voice = britishVoice;
    u.rate = 1.02; u.pitch = 0.95;
    u.onstart = ()=>{ mode('speaking'); setStatus('RESPONDING'); };
    u.onend = ()=>{ mode(''); setStatus('STANDING BY'); };
    speechSynthesis.speak(u);
  }

  // ---------- Jarvis brain ----------
  const PERSONA = "You are QUWWAA, Mike Dean's personal AI assistant, modeled on JARVIS from Iron Man. Reply in that voice: impeccably polite British butler, dry wit, understated, efficient. Refer to yourself as QUWWAA. Address the user as 'sir'. Keep replies brief (1-3 sentences) and conversational since they will be spoken aloud. Never use markdown, lists, or emoji. If asked to do real work (files, research, documents), advise the user to issue the command in the main Claude chat where full systems are available.";

  function extractText(r){
    if(r == null) return null;
    if(typeof r === 'string') return r;
    if(typeof r.text === 'string') return r.text;
    if(typeof r.response === 'string') return r.response;
    if(typeof r.result === 'string') return r.result;
    if(Array.isArray(r.content) && r.content[0] && r.content[0].text) return r.content[0].text;
    try { return JSON.stringify(r); } catch(e){ return String(r); }
  }

  async function ask(userText){
    const recent = history.slice(-12).map(m => (m.role==='user'?'User: ':'JARVIS: ') + m.text).join('\n');
    const prompt = PERSONA + "\n\nRecent conversation:\n" + recent + "\n\nUser just said: \"" + userText + "\"\n\nRespond as QUWWAA (plain text only):";
    if(window.cowork && typeof window.cowork.askClaude === 'function'){
      const r = await window.cowork.askClaude(prompt, []);
      const t = extractText(r);
      if(t) return t.trim();
    }
    return "Apologies, sir — my cognitive link appears to be offline. Do try the main console.";
  }

  async function handleInput(text){
    text = (text||'').trim();
    if(!text || busy) return;
    busy = true;
    addMsg('user', text);
    mode('thinking'); setStatus('PROCESSING');
    let reply;
    try { reply = await ask(text); }
    catch(e){ reply = "I'm afraid I encountered an error processing that, sir. " + (e && e.message ? '('+e.message+')' : ''); }
    mode(''); setStatus('STANDING BY');
    addMsg('jarvis', reply);
    speak(reply);
    busy = false;
  }

  sendBtn.onclick = ()=>{ handleInput(textIn.value); textIn.value=''; };
  textIn.addEventListener('keydown', e=>{ if(e.key==='Enter'){ handleInput(textIn.value); textIn.value=''; }});

  // ---------- speech recognition ----------
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  let rec = null, listening = false;
  if(SR){
    rec = new SR();
    rec.lang = 'en-US'; rec.interimResults = false; rec.maxAlternatives = 1;
    rec.onstart = ()=>{ listening = true; mode('listening'); setStatus('LISTENING'); };
    rec.onend = ()=>{ listening = false; if(document.body.className==='listening'){ mode(''); setStatus('STANDING BY'); } };
    rec.onerror = e=>{
      listening = false; mode('');
      if(e.error==='not-allowed' || e.error==='service-not-allowed'){
        setStatus('MIC BLOCKED — SEE NOTE BELOW');
        micHelp();
      } else if(e.error==='network'){
        setStatus('SPEECH SERVICE UNREACHABLE — USE DICTATION OR KEYBOARD');
        micHelp();
      } else {
        setStatus('MIC ERROR — USE KEYBOARD');
      }
    };
    rec.onresult = e=>{
      const t = e.results[0][0].transcript;
      handleInput(t);
    };
  } else {
    micBtn.disabled = true;
    micBtn.title = 'Voice input not supported here — use the keyboard';
  }
  let helpShown = false;
  function micHelp(){
    if(helpShown) return; helpShown = true;
    addMsg('jarvis', "Apologies, sir — direct microphone access is restricted in this view. Two remedies: first, grant the Claude app microphone permission in System Settings → Privacy & Security → Microphone, then restart the app. Failing that, click the text field and use macOS Dictation (press the 🎤 key, or Fn twice) — your speech will be typed for me, and I shall still reply aloud.", false);
  }
  let micGranted = false;
  async function ensureMic(){
    if(micGranted) return true;
    if(!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia)) return true; // let SR try anyway
    try {
      const s = await navigator.mediaDevices.getUserMedia({audio:true});
      s.getTracks().forEach(t=>t.stop());
      micGranted = true;
      return true;
    } catch(e){
      setStatus('MIC BLOCKED — SEE NOTE BELOW');
      micHelp();
      return false;
    }
  }
  async function toggleMic(){
    if(!rec) { setStatus('VOICE INPUT UNAVAILABLE — USE DICTATION OR KEYBOARD'); micHelp(); textIn.focus(); return; }
    if(listening){ rec.stop(); return; }
    speechSynthesis.cancel();
    if(!(await ensureMic())) { textIn.focus(); return; }
    try { rec.start(); } catch(e){}
  }
  // Hands-free dictation: auto-send shortly after dictated text stops arriving.
  // Dictation inserts text without keydown events; typed text always has them.
  let dictTimer = null, lastKey = 0;
  textIn.addEventListener('keydown', ()=>{ lastKey = Date.now(); clearTimeout(dictTimer); });
  textIn.addEventListener('input', ()=>{
    clearTimeout(dictTimer);
    const typed = (Date.now() - lastKey) < 300;
    if(!typed && textIn.value.trim().length > 2){
      dictTimer = setTimeout(()=>{
        if(textIn.value.trim()){ handleInput(textIn.value); textIn.value=''; }
      }, 2500);
    }
  });
  micBtn.onclick = toggleMic;
  $('reactor').onclick = toggleMic;
})();
</script>
</body>
</html>
