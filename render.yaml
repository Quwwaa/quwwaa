# Render Blueprint — one-click deploy of the QUWWAA backend.
# In Render: New > Blueprint, connect the repo containing this file, and it will
# read these settings automatically. Set ANTHROPIC_API_KEY when prompted.
services:
  - type: web
    name: quwwaa
    runtime: python
    plan: starter         # $7/mo — no sleeping, so the 6am brief job fires reliably (do NOT set back to free)
    buildCommand: "pip install -r requirements.txt"   # pywebpush for Web Push (core stays stdlib)
    startCommand: python quwwaa_server.py
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false        # you paste this secret in the Render dashboard, never in code
      - key: ASK_RATE_PER_MIN
        value: "6"
      - key: ASK_DAILY_CAP
        value: "2000"
      - key: VAPID_PUBLIC_KEY
        sync: false        # Web Push — paste the generated keypair + mailto subject
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false
